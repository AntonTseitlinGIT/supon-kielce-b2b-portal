<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SUPON Kielce — Logowanie</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body{
      min-height:100vh; margin:0;
      display:grid; place-items:center;
      background: var(--bg);
      font-family: var(--font);
      color: var(--text);
    }
    .login{
      width:min(920px, 92vw);
      display:grid;
      grid-template-columns: 1.05fr .95fr;
      border:1px solid var(--line);
      border-radius: 16px;
      overflow:hidden;
      background:#fff;
      box-shadow: 0 10px 30px rgba(0,0,0,.06);
    }
    .login-left{ padding: clamp(24px, 4vw, 40px); }
    .login-left h2{ margin:0 0 6px; font-size: clamp(22px, 2.4vw, 26px); }
    .login-left p{ margin:0 0 24px; color: var(--muted); font-size:14px;}
    .f{ display:grid; gap: 12px; }
    .f label{ font-weight: 600; font-size: 13px; }
    .f input{
      height: 44px; border:1px solid var(--line); border-radius: 10px;
      padding: 0 12px; font-size: 16px; outline: none; background:#fff;
    }
    .f input:focus{ border-color: var(--accent); box-shadow: 0 0 0 4px color-mix(in oklab, var(--accent) 18%, transparent); }
    .f .row{ display:grid; gap:12px; grid-template-columns: 1fr; }
    .btn{
      height:44px; border:0; border-radius: 10px; font-weight:700;
      background: var(--accent); color:#fff; cursor:pointer; margin-top: 4px;
    }
    .alt{ display:flex; justify-content:space-between; align-items:center; margin-top:10px; font-size: 13px; color: var(--muted); }
    .login-right{
      background: var(--nav-bg);
      color: var(--nav-text);
      display:flex; flex-direction:column; justify-content:center; gap: 14px;
      padding: clamp(24px, 4vw, 40px);
    }
    .brand-tile{ display:flex; align-items:center; gap:12px; }
    .brand-tile img{ width: 44px; height:44px; object-fit:contain; filter: drop-shadow(0 6px 10px rgba(0,0,0,.25)); }
    .brand-tile .name{ font-size: clamp(18px, 2vw, 20px); font-weight:800; letter-spacing:.2px}
    .tag{ opacity:.85; font-size: 13px; }
    .role{ font-weight: 800; letter-spacing: .4px; }
    @media (max-width: 760px){
      .login{ grid-template-columns: 1fr; }
      .login-right{ order:-1; border-bottom: 1px solid color-mix(in oklab, #000 8%, transparent); }
    }
  </style>
</head>
<body>
  <main class="login" aria-label="Ekran logowania">
    <section class="login-left" aria-label="Formularz logowania">
      <h2>Zaloguj się</h2>
      <p>Dostęp do panelu SUPON</p>
      <form class="f" onsubmit="event.preventDefault();">
        <div class="row">
          <div>
            <label for="u">Nazwa użytkownika</label>
            <input id="u" name="username" type="text" autocomplete="username" placeholder="np. j.kowalski" required>
          </div>
          <div>
            <label for="p">Hasło</label>
            <input id="p" name="password" type="password" autocomplete="current-password" placeholder="••••••••" required>
          </div>
        </div>
        <button class="btn" type="submit">Zaloguj się</button>
        <div class="alt">
          <span><input id="remember" type="checkbox" checked> <label for="remember">Zapamiętaj mnie</label></span>
          <a href="#" class="muted">Nie pamiętam hasła</a>
        </div>
      </form>
    </section>
    <aside class="login-right" aria-label="Informacje o koncie">
      <div class="brand-tile">
        <img src="logo.png" alt="Logo SUPON">
        <div>
          <div class="name">SUPON KIELCE</div>
          <div class="tag">PLATFORMA OBSŁUGI KLIENTA</div>
        </div>
      </div>
      <div class="role">LOGISTYK 01</div>
    </aside>
  </main>
  <script src="components.js"></script>
  <script src="app.js"></script>
</body>
</html>
