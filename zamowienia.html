<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SUPON Kielce — Twoje Zamówienia</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* Modern Navigation for Orders */
    .orders-controls {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-bottom: 24px;
    }
    
    .search-bar-row {
      display: flex;
      gap: 12px;
      align-items: center;
    }
    
    .search-wrapper {
      position: relative;
      flex: 1;
    }
    
    .search-wrapper input {
      width: 100%;
      height: 48px;
      padding: 0 16px 0 44px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: var(--page-bg);
      font-family: var(--font);
      font-size: 15px;
      transition: all 0.2s ease;
      outline: none;
    }
    
    .search-wrapper input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px color-mix(in oklab, var(--accent) 10%, transparent);
    }
    
    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }
    
    /* Status Chips */
    .status-chips {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 4px;
    }
    
    .chip-filter {
      padding: 8px 16px;
      border-radius: 99px;
      background: var(--page-bg);
      border: 1px solid var(--line);
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s ease;
      white-space: nowrap;
    }
    
    .chip-filter:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    
    .chip-filter.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      box-shadow: 0 4px 12px color-mix(in oklab, var(--accent) 25%, transparent);
    }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Order Table Improvements */
    .order-row {
      transition: all 0.2s ease;
      cursor: pointer;
    }
    
    .order-row:hover {
      background: color-mix(in oklab, var(--accent) 4%, transparent) !important;
    }
    
    .status-tracker {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .tracker-dot {
      width: 8px; height: 8px; border-radius: 50%; background: var(--line);
    }
    
    .tracker-dot.active { background: var(--accent); box-shadow: 0 0 0 3px color-mix(in oklab, var(--accent) 20%, transparent); }

    /* Modal improvements */
    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(2,6,23,.45);
      backdrop-filter: blur(2px); display:none; z-index:1000;
    }
    .modal {
      position: fixed; inset: 0; display:none; place-items:center; z-index:1001;
    }
    .modal.open, .modal-backdrop.open { display:grid; }
    .modal-card {
      width: min(920px, 96vw); background: var(--page-bg); border:1px solid var(--line);
      border-radius:24px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); overflow:hidden;
    }
    .modal-head { padding: 24px 32px; border-bottom: 1px solid var(--line);
      display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .modal-body { padding: 32px; }
    .modal-actions { padding: 20px 32px 32px; border-top: none;
      display: flex; gap: 12px; flex-wrap: wrap; justify-content: flex-end; }
    .modal-close { background:transparent; border:0; font-weight:800; font-size:18px; cursor:pointer; color:var(--muted); }
    .item-photo { width:64px; height:64px; border:1px solid var(--line); border-radius:12px; object-fit:cover; background:#fafbfe; }
    .meta b { color: var(--text); }
  </style>
</head>

            <input class="input" type="date" id="f-od" style="display:block; width:100%; margin-top:4px;">
          </div>
          <div class="form-group">

            <input class="input" type="date" id="f-do" style="display:block; width:100%; margin-top:4px;">
          </div>
          <div class="form-group">
            <label style="font-size: 11px; font-weight: 700; text-transform:uppercase; color: var(--muted);">Zakład / Dział</label>
            <input class="input" type="text" id="f-dept" placeholder="Wszystkie" style="display:block; width:100%; margin-top:4px;">
          </div>
          <div class="form-group" style="display:flex; align-items:flex-end;">
            <button class="btn" id="btnFilterAdv" style="width:100%; height:40px;">Filtruj wyniki</button>
          </div>
        </div>
      </div>

      <!-- TABLE SECTION -->

            <thead>

                <th>Zakład / Dział</th>
                <th>Zawartość</th>
                <th>Status</th>

            </thead>
            <tbody id="orders-tbody">

          </table>
        </div>

        <!-- Pagination UI -->
        <div class="pagination-container">
          <div class="page-size-selector">
            <span>Pokaż:</span>
            <select id="pageSize">

          <div class="page-info" id="pageInfo">Pokazano 1-10 z 25</div>
          <div class="pagination-controls" id="pagination">
            <!-- Buttons rendered here -->
          </div>
        </div>
      </section>

    </div>
  </main>

  <app-footer></app-footer>

            <tbody id="order-items"></tbody>

      </div>
      <div class="modal-actions">

      let currentPage = 1;
      let pageSize = 10;
      let currentStatus = "Nowe";
      let searchQuery = "";

      const tbody = $("#orders-tbody");
      const pagination = $("#pagination");
      const pageInfo = $("#pageInfo");
      const pageSizeSelect = $("#pageSize");
      const mainSearch = $("#mainSearch");
      const chips = $$(".chip-filter");
      const advToggle = $("#advToggle");
      const advPanel = $("#advPanel");

      function getStatusHTML(status) {
        let activeDots = 1;
        let color = "";
        if(status === "W realizacji") activeDots = 2;
        if(status === "Wysłane") activeDots = 3;
        if(status === "Dostarczone") { activeDots = 3; color = "color: var(--ok)"; }
        if(status === "Zatwierdzone") { activeDots = 3; color = "color: var(--accent); font-weight: 700;"; }
        if(status === "Szkic") { activeDots = 0; color = "color: var(--muted);"; }

        const isZatwierdzone = status === "Zatwierdzone";
        return `
          <div class="status-tracker">
            <span class="tracker-dot ${activeDots >= 1 ? 'active' : ''}" style="${isZatwierdzone ? 'background: var(--accent); box-shadow: 0 0 0 3px color-mix(in oklab, var(--accent) 20%, transparent);' : ''}"></span>
            <span class="tracker-dot ${activeDots >= 2 ? 'active' : ''}" style="${isZatwierdzone ? 'background: var(--accent); box-shadow: 0 0 0 3px color-mix(in oklab, var(--accent) 20%, transparent);' : ''}"></span>
            <span class="tracker-dot ${activeDots >= 3 ? 'active' : ''}" style="${isZatwierdzone ? 'background: var(--accent); box-shadow: 0 0 0 3px color-mix(in oklab, var(--accent) 20%, transparent);' : ''}"></span>
            <span style="margin-left:4px; ${color}">${isZatwierdzone ? '✓ ' + status : status}</span>
          </div>
        `;
      }

      function render() {
        const dateFrom = $("#f-od").value;
        const dateTo = $("#f-do").value;
        const deptFilter = $("#f-dept").value.toLowerCase();

        const filtered = DATA.filter(p => {
          const text = (p.id + p.addr + p.status + p.items.map(i=>i.produkt+i.osoba).join("")).toLowerCase();
          const matchQuery = !searchQuery || text.includes(searchQuery);
          const matchStatus = !currentStatus || p.status === currentStatus;
          
          // Date Filter
          const orderDate = new Date(p.created);
          const matchFrom = !dateFrom || orderDate >= new Date(dateFrom);
          const matchTo = !dateTo || orderDate <= new Date(dateTo);
          
          // Dept Filter
          const matchDept = !deptFilter || p.addr.toLowerCase().includes(deptFilter);

          return matchQuery && matchStatus && matchFrom && matchTo && matchDept;
        });

        const total = filtered.length;
        const totalPages = Math.ceil(total / pageSize);
        if(currentPage > totalPages) currentPage = Math.max(1, totalPages);

        const start = (currentPage - 1) * pageSize;
        const slice = filtered.slice(start, start + pageSize);

        tbody.innerHTML = slice.map(p => `
          <tr class="order-row" data-order='${JSON.stringify(p)}'>
            <td><strong>${p.id}</strong></td>
            <td>${p.created}</td>
            <td>${p.addr}</td>
            <td><span class="muted">${p.items.length} poz: ${p.items[0].produkt}...</span></td>
            <td>${getStatusHTML(p.status)}</td>
            <td>${p.eta}</td>
            <td>
              ${p.status === "Szkic" || p.status === "Nowe"
                ? `<div style="display: flex; gap: 6px; align-items: center;">
                     <a class="btn btn-secondary edit-btn" style="height:28px; padding: 0 10px; font-size:12px;" href="nowe-zamowienie.html?edit=${p.id}" data-edit-btn>Edytuj</a>
                     <button class="btn btn-secondary delete-btn" style="height:28px; padding: 0 10px; font-size:12px; color: var(--err); border-color: color-mix(in oklab, var(--err) 35%, transparent);" data-id="${p.id}" data-delete-btn>Usuń</button>
                   </div>`
                : p.status === "W realizacji"
                ? `<a class="btn btn-secondary" style="height:28px; padding: 0 10px; font-size:12px; color: #d97706; border-color: color-mix(in oklab, #d97706 35%, transparent); display: inline-flex; align-items: center;" href="zgloszenia.html?new=true&order=${p.id}&person=${encodeURIComponent(p.items[0].osoba)}&item=${encodeURIComponent(p.items[0].produkt)}">Zgłoszenie</a>`
                : p.status === "Wysłane"
                ? `<button class="btn btn-secondary confirm-btn" style="height:28px; padding: 0 10px; font-size:12px; color: var(--ok); border-color: color-mix(in oklab, var(--ok) 35%, transparent);" data-id="${p.id}" data-confirm-delivery-btn>Potwierdź odbiór</button>`
                : p.status === "Dostarczone"
                ? `<button class="btn btn-secondary accept-btn" style="height:28px; padding: 0 10px; font-size:12px; color: var(--accent); border-color: color-mix(in oklab, var(--accent) 35%, transparent);" data-id="${p.id}" data-accept-order-btn>Zatwierdź</button>`
                : '—'}
            </td>
          </tr>
        `).join("");

        pageInfo.textContent = `Pokazano ${total === 0 ? 0 : start + 1}-${Math.min(start + pageSize, total)} z ${total}`;
        renderPagination(totalPages);
      }

      function renderPagination(totalPages) {
        let html = `<button class="page-btn" ${currentPage === 1 ? 'disabled' : ''} onclick="window.setPage(${currentPage - 1})">Poprzednia</button>`;
        for(let i=1; i<=totalPages; i++) {
          html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="window.setPage(${i})">${i}</button>`;
        }
        html += `<button class="page-btn" ${currentPage === totalPages || totalPages === 0 ? 'disabled' : ''} onclick="window.setPage(${currentPage + 1})">Następna</button>`;
        pagination.innerHTML = html;
      }

      window.setPage = (p) => { currentPage = p; render(); };

      pageSizeSelect.addEventListener("change", (e) => {
        pageSize = parseInt(e.target.value);
        currentPage = 1;
        render();
      });

      const applyFilters = () => {
        searchQuery = mainSearch.value.toLowerCase();
        currentPage = 1;
        render();
      };

      $("#btnFilterMain").addEventListener("click", applyFilters);
      $("#btnFilterAdv").addEventListener("click", applyFilters);
      
      mainSearch.addEventListener("keypress", (e) => {
        if(e.key === "Enter") applyFilters();
      });

      chips.forEach(chip => {
        chip.addEventListener("click", () => {
          chips.forEach(c => c.classList.remove("active"));
          chip.classList.add("active");
          currentStatus = chip.getAttribute("data-status");
          currentPage = 1;
          render();
        });
      });

      advToggle.addEventListener("click", () => advPanel.classList.toggle("open"));

      // Modal Logic
      const modal = $("#order-modal");
      const backdrop = $("#modal-backdrop");
      const itemsBox = $("#order-items");
      const metaBox = $("#order-meta");
      const title = $("#order-title");
      const openM = ()=> { modal.classList.add("open"); backdrop.classList.add("open"); document.body.style.overflow = "hidden"; };
      const closeM = ()=> { modal.classList.remove("open"); backdrop.classList.remove("open"); document.body.style.overflow = ""; };
      
      modal.addEventListener("click", e=>{ 
        if(e.target.matches("[data-close]")) closeM(); 
        if(e.target.closest("[data-delete-modal-btn]")) {
          const btn = e.target.closest("[data-delete-modal-btn]");
          const orderId = btn.getAttribute("data-id");
          if (confirm(`Czy na pewno chcesz trwale usunąć zamówienie ${orderId}?`)) {
            closeM();
            DATA = DATA.filter(o => o.id !== orderId);
            localStorage.setItem('portal_orders', JSON.stringify(DATA));
            if (window.showToast) {
              window.showToast(`Zamówienie ${orderId} zostało pomyślnie usunięte.`);
            } else {
              alert(`Zamówienie ${orderId} zostało usunięte.`);
            }
            render();
          }
        }
        if(e.target.closest("[data-confirm-modal-btn]")) {
          const btn = e.target.closest("[data-confirm-modal-btn]");
          const orderId = btn.getAttribute("data-id");
          if (confirm(`Czy na pewno chcesz potwierdzić odbiór zamówienia ${orderId}?`)) {
            closeM();
            const orderIndex = DATA.findIndex(o => o.id === orderId);
            if (orderIndex !== -1) {
              DATA[orderIndex].status = "Dostarczone";
              localStorage.setItem('portal_orders', JSON.stringify(DATA));
              if (window.showToast) {
                window.showToast(`Odbiór zamówienia ${orderId} został potwierdzony!`);
              } else {
                alert(`Odbiór zamówienia ${orderId} został potwierdzony!`);
              }
              render();
            }
          }
        }
        if(e.target.closest("[data-accept-modal-btn]")) {
          const btn = e.target.closest("[data-accept-modal-btn]");
          const orderId = btn.getAttribute("data-id");
          if (confirm(`Czy na pewno chcesz zatwierdzić i zamknąć zamówienie ${orderId}? Status zmieni się na Zatwierdzone.`)) {
            closeM();
            const orderIndex = DATA.findIndex(o => o.id === orderId);
            if (orderIndex !== -1) {
              DATA[orderIndex].status = "Zatwierdzone";
              localStorage.setItem('portal_orders', JSON.stringify(DATA));
              if (window.showToast) {
                window.showToast(`Zamówienie ${orderId} zostało pomyślnie zatwierdzone!`);
              } else {
                alert(`Zamówienie ${orderId} zostało pomyślnie zatwierdzone!`);
              }
              render();
            }
          }
        }
      });
      backdrop.addEventListener("click", closeM);
 
      tbody.addEventListener("click", (e)=>{
        if (e.target.closest("[data-accept-order-btn]")) {
          const btn = e.target.closest("[data-accept-order-btn]");
          const orderId = btn.getAttribute("data-id");
          if (confirm(`Czy na pewno chcesz zatwierdzić i zamknąć zamówienie ${orderId}? Status zmieni się na Zatwierdzone.`)) {
            const orderIndex = DATA.findIndex(o => o.id === orderId);
            if (orderIndex !== -1) {
              DATA[orderIndex].status = "Zatwierdzone";
              localStorage.setItem('portal_orders', JSON.stringify(DATA));
              if (window.showToast) {
                window.showToast(`Zamówienie ${orderId} zostało pomyślnie zatwierdzone!`);
              } else {
                alert(`Zamówienie ${orderId} zostało pomyślnie zatwierdzone!`);
              }
              render();
            }
          }
          return;
        }
        if (e.target.closest("[data-confirm-delivery-btn]")) {
          const btn = e.target.closest("[data-confirm-delivery-btn]");
          const orderId = btn.getAttribute("data-id");
          if (confirm(`Czy na pewno chcesz potwierdzić odbiór zamówienia ${orderId}?`)) {
            const orderIndex = DATA.findIndex(o => o.id === orderId);
            if (orderIndex !== -1) {
              DATA[orderIndex].status = "Dostarczone";
              localStorage.setItem('portal_orders', JSON.stringify(DATA));
              if (window.showToast) {
                window.showToast(`Odbiór zamówienia ${orderId} został potwierdzony!`);
              } else {
                alert(`Odbiór zamówienia ${orderId} został potwierdzony!`);
              }
              render();
            }
          }
          return;
        }
        if (e.target.closest("[data-delete-btn]")) {
          const btn = e.target.closest("[data-delete-btn]");
          const orderId = btn.getAttribute("data-id");
          if (confirm(`Czy na pewno chcesz trwale usunąć zamówienie ${orderId}?`)) {
            DATA = DATA.filter(o => o.id !== orderId);
            localStorage.setItem('portal_orders', JSON.stringify(DATA));
            if (window.showToast) {
              window.showToast(`Zamówienie ${orderId} zostało pomyślnie usunięte.`);
            } else {
              alert(`Zamówienie ${orderId} zostało usunięte.`);
            }
            render();
          }
          return;
        }
        if (e.target.closest("[data-edit-btn]")) {
          // Allow the edit click to proceed naturally
          return;
        }
        const tr = e.target.closest("tr[data-order]");
        if(!tr) return;
        const p = JSON.parse(tr.getAttribute("data-order"));
        title.textContent = `Szczegóły zamówienia ${p.id}`;
        metaBox.innerHTML = `
          <div><label class="label-caps" style="display:block">Status</label><b>${p.status}</b></div>
          <div><label class="label-caps" style="display:block">Data</label><b>${p.created}</b></div>
          <div><label class="label-caps" style="display:block">Dostawa</label><b>${p.addr}</b></div>
          <div><label class="label-caps" style="display:block">ETA</label><b>${p.eta}</b></div>
        `;
        itemsBox.innerHTML = p.items.map(it=>`
          <tr>
            <td><img class="item-photo" src="${it.foto}" alt="" width="50"></td>
            <td><b>${it.produkt}</b></td>
            <td>${it.nr}</td>
            <td>${it.rozmiar}</td>
            <td>${it.ilosc}</td>
            <td>${it.osoba}</td>
          </tr>
        `).join("");
 
        // Update modal actions dynamically
        const modalActions = $(".modal-actions", modal);
        if (p.status === "Szkic" || p.status === "Nowe") {
          modalActions.innerHTML = `
            <a class="btn" href="nowe-zamowienie.html?edit=${p.id}">Edytuj zamówienie</a>
            <button class="btn btn-secondary" style="color: var(--err); border-color: color-mix(in oklab, var(--err) 35%, transparent);" type="button" data-delete-modal-btn data-id="${p.id}">Usuń zamówienie</button>
            <button class="btn btn-secondary" type="button" data-close>Zamknij</button>
          `;
        } else if (p.status === "W realizacji") {
          modalActions.innerHTML = `
            <a class="btn" style="background: #d97706; border-color: #d97706;" href="zgloszenia.html?new=true&order=${p.id}&person=${encodeURIComponent(p.items[0].osoba)}&item=${encodeURIComponent(p.items[0].produkt)}">Utwórz zgłoszenie</a>
            <button class="btn btn-secondary" type="button">Pobierz WZ (PDF)</button>
            <button class="btn btn-secondary" type="button" data-close>Zamknij</button>
          `;
        } else if (p.status === "Wysłane") {
          modalActions.innerHTML = `
            <button class="btn" style="background: var(--ok); border-color: var(--ok);" type="button" data-confirm-modal-btn data-id="${p.id}">Potwierdź odbiór</button>
            <button class="btn btn-secondary" type="button">Pobierz WZ (PDF)</button>
            <button class="btn btn-secondary" type="button" data-close>Zamknij</button>
          `;
        } else if (p.status === "Dostarczone") {
          modalActions.innerHTML = `
            <button class="btn" style="background: var(--accent); border-color: var(--accent);" type="button" data-accept-modal-btn data-id="${p.id}">Zatwierdź zamówienie</button>
            <button class="btn btn-secondary" type="button">Pobierz WZ (PDF)</button>
            <button class="btn btn-secondary" type="button" data-close>Zamknij</button>
          `;
        } else {
          modalActions.innerHTML = `
            <button class="btn btn-secondary" type="button">Pobierz WZ (PDF)</button>
            <button class="btn btn-secondary" type="button">Powtórz zamówienie</button>
            <button class="btn" type="button" data-close>Zamknij</button>
          `;
        }

        openM();
      });

      render();
    })();
  </script>
  <script src="components.js"></script>
</body>
</html>
